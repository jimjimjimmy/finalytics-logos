<title>Finalytics — Logo Animation Shell</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    background: #131313;
    font-family: -apple-system, "Inter", sans-serif;
    color: #999;
  }
  body {
    display: flex;
    flex-direction: column;
  }

  /* ── main content area ── */
  .content {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 64px;
  }

  .stage {
    width: 320px;
    height: 320px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: width 0.25s ease, height 0.25s ease;
  }
  /* 33% of the large stage — lets the client check the mark reads at a
     small/icon-ish size without two sizes cluttering the view at once */
  .stage[data-size="small"] {
    width: 106px;
    height: 106px;
  }
  .stage svg, .stage img { max-width: 100%; max-height: 100%; width: auto; height: auto; }
  /* SVGs clip content to their viewBox by default (like overflow: hidden).
     Spin rotates the whole composition as a group, so a rotated bounding
     box can briefly extend past the viewBox — most visible on tall/narrow
     marks like Logo 03. overflow: visible lets that render uncropped. */
  .stage svg { overflow: visible; }
  .stage img { object-fit: contain; }

  /* anchored to the bottom of the page, just above the logo dock — size
     toggle, style dots, and loop toggle all sit on one row */
  .controls {
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: center;
    gap: 28px;
    padding: 18px 24px;
  }

  .size-toggle {
    display: flex;
    gap: 2px;
    background: #000;
    border-radius: 20px;
    padding: 3px;
  }
  .size-toggle button {
    background: transparent;
    border: none;
    color: #777;
    font-size: 11px;
    padding: 6px 16px;
    border-radius: 16px;
    cursor: pointer;
    font-family: inherit;
  }
  .size-toggle button:hover { color: #aaa; }
  .size-toggle button.active {
    background: #2a2a2a;
    color: #eee;
  }

  .dots {
    display: flex;
    align-items: center;
  }
  /* button is the hit area (44px min tap target); the visible dot is a
     smaller child span so click area stays generous without growing the
     dot's appearance */
  .dot {
    width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: transparent;
    border: none;
    cursor: pointer;
    padding: 0;
  }
  .dot-visual {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #3a3a3a;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    color: transparent;
    transition: background 0.15s, width 0.15s, height 0.15s, font-size 0.15s;
  }
  .dot:hover .dot-visual {
    background: #4a4a4a;
  }
  .dot.active .dot-visual {
    background: #555;
    width: 20px;
    height: 20px;
    color: #ccc;
    font-size: 11px;
  }

  .loop-toggle {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 12px;
    color: #777;
    cursor: pointer;
    user-select: none;
    padding: 6px 10px;
  }
  .loop-toggle input {
    width: 13px;
    height: 13px;
    accent-color: #666;
    cursor: pointer;
  }
  .loop-toggle:hover { color: #aaa; }

  /* ── reveal animation: fragment mode (individual <path> elements) ── */
  .reveal-path {
    opacity: 0;
    transform-box: fill-box;
    transform-origin: center;
  }
  /* ── reveal animation: whole mode (single <img>, no fragment data yet) ── */
  .reveal-whole {
    opacity: 0;
    transform-origin: center;
  }

  [data-direction="up"] .reveal-path     { transform: translateY(10px) scale(0.9); }
  [data-direction="down"] .reveal-path   { transform: translateY(-16px) scale(0.85); }
  [data-direction="up"] .reveal-whole    { transform: translateY(16px) scale(0.92); }
  [data-direction="down"] .reveal-whole  { transform: translateY(-22px) scale(0.88); }

  [data-direction="up"].played .reveal-path {
    animation: revealIn 0.32s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    animation-delay: var(--delay);
  }
  [data-direction="down"].played .reveal-path {
    animation: revealIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    animation-delay: var(--delay);
  }
  [data-direction="up"].played .reveal-whole {
    animation: revealWholeIn 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }
  [data-direction="down"].played .reveal-whole {
    animation: revealWholeIn 0.32s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
  }
  @keyframes revealIn {
    to { opacity: var(--target-opacity); transform: translateY(0) scale(1); }
  }
  @keyframes revealWholeIn {
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* ── Rise, concentric-ring override (Logo 05 only, via [data-concentric]):
     the largest ring shows first as a plain reveal, then each smaller
     ring rotates into view in sequence. --rise-* custom properties are
     0/unset for the first ring, so it naturally falls back to a plain
     fade — no separate rule needed to special-case it. ── */
  [data-direction="up"][data-concentric="1"] .reveal-path {
    transform: translate(0, var(--rise-dy, 0px)) rotate(var(--rise-rotate-from, 0deg)) scale(var(--rise-scale, 0.9));
  }
  [data-direction="up"][data-concentric="1"].played .reveal-path {
    animation: riseRotateIn var(--rise-duration, 0.26s) cubic-bezier(0.3, 1, 0.4, 1) forwards;
    animation-delay: var(--rise-delay, 0ms);
  }
  @keyframes riseRotateIn {
    to { opacity: var(--target-opacity); transform: translate(0, 0) rotate(0deg) scale(1); }
  }

  /* ── radiate style: the brightest ("core") fragments drop into place
     first, then the dimmer ("satellite") fragments burst outward from
     whichever core fragment sits nearest them. --dx/--dy (the direction
     back toward that core) and --r-delay are computed per-fragment in JS
     from actual getBBox() positions — nothing here is hardcoded. ── */
  [data-direction="radiate"] .reveal-path.core,
  [data-direction="spin"] .reveal-path.core {
    transform: translate(var(--dx, 0px), var(--dy, -16px)) scale(var(--scale-from, 0.85));
  }
  [data-direction="radiate"] .reveal-path.satellite,
  [data-direction="spin"] .reveal-path.satellite {
    transform: translate(var(--dx, 0px), var(--dy, 0px)) scale(var(--scale-from, 0.4));
  }
  [data-direction="radiate"].played .reveal-path.core,
  [data-direction="spin"].played .reveal-path.core {
    animation: revealIn 0.15s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    animation-delay: var(--r-delay);
  }
  [data-direction="radiate"].played .reveal-path.satellite,
  [data-direction="spin"].played .reveal-path.satellite {
    animation: radiateIn 0.13s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    animation-delay: var(--r-delay);
  }
  @keyframes radiateIn {
    to { opacity: var(--target-opacity); transform: translate(0, 0) scale(1); }
  }
  /* whole-mode logos have no fragments to split into core/satellite, so
     Radiate gets its own distinct "spin into focus" entrance — rotation
     + scale, no vertical drop — rather than reusing Fall's motion */
  [data-direction="radiate"] .reveal-whole { transform: rotate(-20deg) scale(0.4); }
  [data-direction="radiate"].played .reveal-whole {
    animation: revealWholeSpinIn 0.42s cubic-bezier(0.34, 1.75, 0.64, 1) forwards;
  }
  @keyframes revealWholeSpinIn {
    to { opacity: 1; transform: rotate(0deg) scale(1); }
  }

  /* ── spin style: fragments assemble on the exact same positions/timing
     as Radiate (shared rules above) — the difference is the whole
     composition rotates into alignment as ONE unit while it assembles,
     via .spin-group. Each piece spinning on its own axis read as noise
     rather than a build; a single coherent rotation reads as the logo
     spinning into formation. --spin-group-duration is set in JS to
     match how long the assembly actually takes for the active logo. ── */
  [data-direction="spin"] .reveal-whole { transform: rotate(-40deg) scale(0.7); }
  [data-direction="spin"].played .reveal-whole {
    animation: revealWholeSpinIn 0.5s cubic-bezier(0.34, 1.4, 0.64, 1) forwards;
  }
  [data-direction="spin"] .spin-group {
    transform-box: fill-box;
    transform-origin: center;
    transform: rotate(-26deg);
  }
  [data-direction="spin"].played .spin-group {
    animation: spinGroupIn var(--spin-group-duration, 0.5s) cubic-bezier(0.3, 1, 0.4, 1) forwards;
  }
  @keyframes spinGroupIn {
    to { transform: rotate(0deg); }
  }

  /* ── bottom dock ── */
  .dock {
    background: #000;
    padding: 22px 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 36px;
  }
  .dock-item {
    width: 56px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    border: none;
    background: transparent;
    padding: 0;
    position: relative;
  }
  .dock-item img { max-width: 100%; max-height: 100%; object-fit: contain; }
  .dock-item.active::after {
    content: "";
    position: absolute;
    bottom: -12px;
    left: 50%;
    transform: translateX(-50%);
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: #eee;
  }
</style>
<div class="content">
  <div class="stage" id="stage" data-direction="up"></div>
</div>

<div class="controls">
  <div class="size-toggle" id="sizeToggle">
    <button data-size="large" class="active">Large</button>
    <button data-size="small">Small</button>
  </div>
  <!-- one dot per animation style in STYLES; click to preview that style -->
  <div class="dots" id="dots"></div>
  <label class="loop-toggle"><input type="checkbox" id="loopToggle" checked /> Loop</label>
</div>

<div class="dock" id="dock"></div>

  const STYLE_ORDER = Object.keys(STYLES);

  /* ── shared radiate timing constants (used by both the one-shot
     build-in and the seamless build-in/build-out loop, so they always
     match) ── */
  const CORE_STAGGER_MS = 30;
  const CORE_DUR_MS = 150;
  const SAT_SETTLE_MS = 170;
  const SAT_STAGGER_MS = 18;
  const SAT_DUR_MS = 130;
  const WHOLE_DUR_MS = 160;
  const LOOP_HOLD_MS = 200;   // pause while fully formed
  const LOOP_REST_MS = 175;   // pause while fully hidden, before next cycle

  /* ── concentric-ring radiate (e.g. Logo 05's nested squares): the
     smallest/brightest ring is the "core" and scales in first, then
     each larger ring follows in size order, purely by scale — no
     positional burst, since the rings are already concentric ── */
  const RING_SETTLE_MS = 100;   // gap after the core ring before rings start
  const RING_STAGGER_MS = 80;   // gap between each successive ring

  /* ── concentric-ring Rise override: the largest (outermost) ring shows
     first as a plain reveal, then each smaller ring rotates into view,
     one at a time, largest-to-smallest — opposite ordering from Radiate,
     and rotation instead of scale is the reveal mechanism ── */
  const RISE_OUTER_DUR_MS = 260;
  const RISE_INNER_DUR_MS = 220;
  const RISE_INNER_SETTLE_MS = 200;   // gap after the outer ring before inner rings start
  const RISE_INNER_STAGGER_MS = 110;  // gap between each successive inner ring

  /* ── easing + motion for Rise/Fall, matching their one-shot CSS values
     (STAGGER_MS reuses the same per-fragment --delay already set in
     renderStage()) so the loop enters exactly like the plain reveal ── */
  const EASE_UP = 'cubic-bezier(0.16, 1, 0.3, 1)';
  const EASE_DOWN = 'cubic-bezier(0.34, 1.56, 0.64, 1)';
  const EASE_RADIATE_SAT = 'cubic-bezier(0.22, 1, 0.36, 1)';
  const EASE_WHOLE_SPIN = 'cubic-bezier(0.34, 1.75, 0.64, 1)';
  const EASE_SPIN = 'cubic-bezier(0.34, 1.4, 0.64, 1)';
  const EASE_RISE_ROTATE = 'cubic-bezier(0.3, 1, 0.4, 1)';
  const EASE_EXIT = 'cubic-bezier(0.55, 0, 1, 0.45)';
  const SPIN_GROUP_ANGLE = -26; // degrees — matches the CSS .spin-group rule

  const PATH_MOTION = {
    up:   { dx: '0px', dy: '10px',  scaleFrom: 0.9,  duration: 320, ease: EASE_UP },
    down: { dx: '0px', dy: '-16px', scaleFrom: 0.85, duration: 300, ease: EASE_DOWN }
  };
  const WHOLE_MOTION = {
    up:      { dx: '0px', dy: '16px',  scaleFrom: 0.92, duration: 350, ease: EASE_UP },
    down:    { dx: '0px', dy: '-22px', scaleFrom: 0.88, duration: 320, ease: EASE_DOWN },
    // whole-image logos can't split into fragments, so radiate gets its
    // own "spin into focus" entrance (rotation + scale, no drop) instead
    // of reusing Fall's motion — this is their genuinely dramatic option
    radiate: { dx: '0px', dy: '0px', rotateFrom: '-20deg', scaleFrom: 0.4, duration: 420, ease: EASE_WHOLE_SPIN },
    // spin is a bigger, more dramatic rotation than radiate's subtle tilt
    spin: { dx: '0px', dy: '0px', rotateFrom: '-200deg', scaleFrom: 0.5, duration: 500, ease: EASE_SPIN }
  };

  const stage = document.getElementById('stage');
  const dock = document.getElementById('dock');
  const dots = document.getElementById('dots');
  const sizeToggle = document.getElementById('sizeToggle');
  let activeKey = ORDER[0];
  let activeStyle = STYLE_ORDER[0];
  // remembers each logo's own last-viewed style, so returning to a logo
  // resumes where you left it — only the very first visit defaults to
  // the first available style
  const lastStyleByLogo = {};

  ORDER.forEach((key) => {
    const logo = LOGOS[key];
    const btn = document.createElement('button');
    btn.className = 'dock-item';
    btn.dataset.key = key;
    btn.title = logo.label;
    btn.innerHTML = `<img src="${logo.file}" alt="${logo.label}" />`;
    btn.addEventListener('click', () => selectLogo(key));
    dock.appendChild(btn);
  });

  /* Not every style suits every logo (e.g. a plain fade is a poor fit
     for concentric rings) — each logo can opt out via excludeStyles.
     Dots are rebuilt whenever the active logo changes. */
  function availableStyles(logo) {
    const exclude = logo.excludeStyles || [];
    return STYLE_ORDER.filter(key => !exclude.includes(key));
  }

  function renderDots() {
    const logo = LOGOS[activeKey];
    const available = availableStyles(logo);
    // safety net only — selectLogo() is what actually decides activeStyle
    if (!available.includes(activeStyle)) activeStyle = available[0];
    stage.dataset.direction = STYLES[activeStyle].direction;

    dots.innerHTML = '';
    available.forEach((key, i) => {
      const dot = document.createElement('button');
      dot.className = 'dot';
      dot.dataset.key = key;
      dot.title = STYLES[key].label;
      dot.innerHTML = `<span class="dot-visual">${i + 1}</span>`;
      dot.addEventListener('click', () => selectStyle(key));
      dots.appendChild(dot);
    });
    Array.from(dots.children).forEach(el => el.classList.toggle('active', el.dataset.key === activeStyle));
  }

  function selectLogo(key) {
    activeKey = key;
    Array.from(dock.children).forEach(el => el.classList.toggle('active', el.dataset.key === key));

    // first visit to this logo → first available style; returning to a
    // logo you've already seen → resume its own last-viewed style
    const available = availableStyles(LOGOS[key]);
    const remembered = lastStyleByLogo[key];
    activeStyle = (remembered && available.includes(remembered)) ? remembered : available[0];

    renderDots();
    renderStage();
    applyLoopState();
  }

  function selectStyle(key) {
    activeStyle = key;
    lastStyleByLogo[activeKey] = key;
    Array.from(dots.children).forEach(el => el.classList.toggle('active', el.dataset.key === key));
    stage.dataset.direction = STYLES[key].direction;
    applyLoopState();
  }

  sizeToggle.addEventListener('click', (e) => {
    const btn = e.target.closest('button');
    if (!btn) return;
    stage.dataset.size = btn.dataset.size;
    Array.from(sizeToggle.children).forEach(el => el.classList.toggle('active', el === btn));
  });

  function renderStage() {
    const logo = LOGOS[activeKey];
    stage.dataset.concentric = logo.radiateMode === 'concentric' ? '1' : '0';
    if (logo.mode === 'paths') {
      stage.innerHTML = `<svg viewBox="0 0 ${logo.native[0]} ${logo.native[1]}" fill="none" xmlns="http://www.w3.org/2000/svg"><g class="spin-group">${logo.svg}</g></svg>`;
      const paths = Array.from(stage.querySelectorAll('.reveal-frag'));
      // layered logos (few, deliberate fragments) read better with a
      // much wider gap between each than the tile-based logos' quick
      // stagger — otherwise Rise/Fall barely show the layers separating
      const staggerMs = logo.radiateMode === 'layered' ? 150 : 18;
      paths.forEach((p, i) => {
        const targetOpacity = p.getAttribute('opacity') || '1';
        p.classList.add('reveal-path');
        p.style.setProperty('--target-opacity', targetOpacity);
        p.style.setProperty('--delay', (i * staggerMs) + 'ms');
        p.removeAttribute('opacity');
      });
      let entryFinish;
      if (logo.radiateMode === 'concentric') {
        entryFinish = computeConcentricRadiateData(paths);
        computeConcentricRiseData(paths);
      } else if (logo.radiateMode === 'layered') {
        entryFinish = computeLayeredRadiateData(paths);
      } else {
        entryFinish = computeRadiateData(paths);
      }
      // drives .spin-group's rotation duration so the whole composition
      // finishes spinning into alignment exactly as the last fragment lands
      stage.style.setProperty('--spin-group-duration', entryFinish + 'ms');
    } else {
      stage.innerHTML = `<img class="reveal-whole" src="${logo.file}" alt="${logo.label}" />`;
    }
  }

  /* Classifies fragments into "core" (the brightest — highest target
     opacity) vs "satellite", using each fragment's real on-screen bbox
     center to find the nearest core and the direction back toward it.
     Cores settle first; satellites burst outward from their nearest core,
     closest ones first. */
  function computeRadiateData(paths) {
    const infos = paths.map(p => {
      const bbox = p.getBBox();
      return {
        el: p,
        cx: bbox.x + bbox.width / 2,
        cy: bbox.y + bbox.height / 2,
        opacity: parseFloat(p.style.getPropertyValue('--target-opacity'))
      };
    });
    const maxOpacity = Math.max(...infos.map(i => i.opacity));
    const cores = infos.filter(i => i.opacity === maxOpacity);
    const satellites = infos.filter(i => i.opacity !== maxOpacity);

    cores.forEach((c, i) => {
      c.el.classList.add('core');
      c.el.style.setProperty('--r-delay', (i * CORE_STAGGER_MS) + 'ms');
      // cores don't radiate outward from anything, but give them a
      // dx/dy anyway (straight drop) so the seamless loop can treat
      // every fragment — core or satellite — the same way.
      c.el.style.setProperty('--dx', '0px');
      c.el.style.setProperty('--dy', '-16px');
    });

    satellites
      .map(s => {
        let nearest = cores[0], best = Infinity;
        cores.forEach(c => {
          const d = Math.hypot(s.cx - c.cx, s.cy - c.cy);
          if (d < best) { best = d; nearest = c; }
        });
        return Object.assign(s, { dist: best, core: nearest });
      })
      .sort((a, b) => a.dist - b.dist)
      .forEach((s, i) => {
        const dirX = s.core.cx - s.cx;
        const dirY = s.core.cy - s.cy;
        const mag = Math.hypot(dirX, dirY) || 1;
        const pull = Math.min(mag * 0.6, 40);
        s.el.classList.add('satellite');
        s.el.style.setProperty('--dx', ((dirX / mag) * pull).toFixed(1) + 'px');
        s.el.style.setProperty('--dy', ((dirY / mag) * pull).toFixed(1) + 'px');
        s.el.style.setProperty('--r-delay', (SAT_SETTLE_MS + i * SAT_STAGGER_MS) + 'ms');
      });

    const lastSatDelay = SAT_SETTLE_MS + (satellites.length - 1) * SAT_STAGGER_MS;
    return Math.max(cores.length * CORE_STAGGER_MS + CORE_DUR_MS, lastSatDelay + SAT_DUR_MS);
  }

  /* Concentric radiate: ranks fragments by their own on-screen size
     (smallest first) rather than by opacity/distance — the smallest
     ring is the "core" and scales in from the center, then each larger
     ring follows in size order, purely by scale with zero positional
     offset, so it reads as rings expanding outward from the middle. */
  function computeConcentricRadiateData(paths) {
    const ranked = paths
      .map(p => {
        const bbox = p.getBBox();
        return { el: p, size: Math.max(bbox.width, bbox.height) };
      })
      .sort((a, b) => a.size - b.size);

    ranked.forEach((r, i) => {
      r.el.style.setProperty('--dx', '0px');
      r.el.style.setProperty('--dy', '0px');
      if (i === 0) {
        r.el.classList.add('core');
        r.el.style.setProperty('--r-delay', '0ms');
      } else {
        r.el.classList.add('satellite');
        r.el.style.setProperty('--r-delay', (RING_SETTLE_MS + (i - 1) * RING_STAGGER_MS) + 'ms');
      }
    });

    const ringCount = ranked.length;
    return RING_SETTLE_MS + (ringCount - 2) * RING_STAGGER_MS + SAT_DUR_MS;
  }

  /* Rise override for concentric logos: ranks the same fragments largest
     first (opposite of computeConcentricRadiateData). The largest ring
     gets a plain reveal (--rise-* left at their CSS defaults); each
     smaller ring after it gets a staggered delay and a rotate-from angle
     that widens as the rings get smaller, toward the center. */
  function computeConcentricRiseData(paths) {
    const ranked = paths
      .map(p => {
        const bbox = p.getBBox();
        return { el: p, size: Math.max(bbox.width, bbox.height) };
      })
      .sort((a, b) => b.size - a.size);

    ranked.forEach((r, i) => {
      if (i === 0) {
        r.el.style.setProperty('--rise-delay', '0ms');
        r.el.style.setProperty('--rise-dy', '10px');
        r.el.style.setProperty('--rise-rotate-from', '0deg');
        r.el.style.setProperty('--rise-scale', '0.9');
        r.el.style.setProperty('--rise-duration', RISE_OUTER_DUR_MS + 'ms');
      } else {
        r.el.style.setProperty('--rise-delay', (RISE_INNER_SETTLE_MS + (i - 1) * RISE_INNER_STAGGER_MS) + 'ms');
        r.el.style.setProperty('--rise-dy', '0px');
        r.el.style.setProperty('--rise-rotate-from', -(40 + (i - 1) * 35) + 'deg');
        r.el.style.setProperty('--rise-scale', '0.5');
        r.el.style.setProperty('--rise-duration', RISE_INNER_DUR_MS + 'ms');
      }
    });
  }

  /* Layered radiate (Logo 06): a fixed, hand-authored reveal order rather
     than one derived from opacity or size — the fragments already come
     out of the registry in build order [outline, center, shadow], so
     this just assigns timing/motion by position. The shadow/glow is
     deliberately last and calmer (barely rotates, gentler scale) than
     the two diamond layers. */
  function computeLayeredRadiateData(paths) {
    const [outline, center, shadow] = paths;
    if (!outline || !center || !shadow) return;

    outline.classList.add('core');
    outline.style.setProperty('--dx', '0px');
    outline.style.setProperty('--dy', '0px');
    outline.style.setProperty('--r-delay', '0ms');
    outline.style.setProperty('--scale-from', '0.5');

    center.classList.add('satellite');
    center.style.setProperty('--dx', '0px');
    center.style.setProperty('--dy', '0px');
    center.style.setProperty('--r-delay', '120ms');
    center.style.setProperty('--scale-from', '0.3');

    shadow.classList.add('satellite');
    shadow.style.setProperty('--dx', '0px');
    shadow.style.setProperty('--dy', '0px');
    shadow.style.setProperty('--r-delay', '280ms');
    shadow.style.setProperty('--scale-from', '0.75');

    return 280 + SAT_DUR_MS;
  }

  let loopEnabled = true;

  /* One-shot build-in only — used for a plain (non-loop) reveal. */
  function playReveal() {
    stage.classList.remove('played');
    void stage.offsetWidth;
    stage.classList.add('played');
  }

  /* Cancels anything currently animating the stage — WAAPI seamless-loop
     animations from a previous cycle, or an in-flight CSS reveal — so
     switching logo/style/loop-mode always starts from a clean slate. */
  function resetStageAnimations() {
    stage.classList.remove('played');
    stage.querySelectorAll('.reveal-path, .reveal-whole, .spin-group').forEach(el => {
      el.getAnimations().forEach(a => a.cancel());
    });
  }

  /* Seamless loop: builds in, holds, builds back out (mirrored — last
     fragment in is first to leave), pauses briefly while hidden, repeats
     forever. Each fragment gets one Web Animations API timeline sized to
     a shared total cycle length, so they stay in lockstep indefinitely
     without any JS re-scheduling (and without JS timer drift). */
  function playSeamlessLoop(entries, groupEl, groupRotateDeg) {
    const entryFinish = Math.max(...entries.map(e => e.delay + e.duration));
    const exitPhaseStart = entryFinish + LOOP_HOLD_MS;
    entries.forEach(e => {
      e.exitDelay = exitPhaseStart + (entryFinish - (e.delay + e.duration));
      e.exitEnd = e.exitDelay + e.duration;
    });
    const exitFinish = Math.max(...entries.map(e => e.exitEnd));
    const totalCycle = exitFinish + LOOP_REST_MS;

    entries.forEach(e => {
      const hidden = `translate(${e.dx}, ${e.dy}) rotate(${e.rotateFrom || '0deg'}) scale(${e.scaleFrom})`;
      const visible = 'translate(0px, 0px) rotate(0deg) scale(1)';
      const keyframes = [
        { offset: 0, opacity: 0, transform: hidden },
        { offset: Math.min(e.delay / totalCycle, 1), opacity: 0, transform: hidden },
        { offset: Math.min((e.delay + e.duration) / totalCycle, 1), opacity: e.targetOpacity, transform: visible, easing: e.enterEase },
        { offset: Math.min(e.exitDelay / totalCycle, 1), opacity: e.targetOpacity, transform: visible },
        { offset: Math.min(e.exitEnd / totalCycle, 1), opacity: 0, transform: hidden, easing: EASE_EXIT }
      ];
      e.el.animate(keyframes, { duration: totalCycle, iterations: Infinity, fill: 'none' });
    });

    // spin style: the whole composition rotates into alignment while it
    // assembles (entryFinish), holds flat, then rotates back out as it
    // dissolves — mirrors the same build-in/hold/build-out shape as the
    // fragments, just rotation-only (no opacity change on the group).
    if (groupEl && groupRotateDeg) {
      const spun = `rotate(${groupRotateDeg}deg)`;
      const aligned = 'rotate(0deg)';
      const groupKeyframes = [
        { offset: 0, transform: spun },
        { offset: Math.min(entryFinish / totalCycle, 1), transform: aligned, easing: EASE_RISE_ROTATE },
        { offset: Math.min(exitPhaseStart / totalCycle, 1), transform: aligned },
        { offset: Math.min(exitFinish / totalCycle, 1), transform: spun, easing: EASE_EXIT }
      ];
      groupEl.animate(groupKeyframes, { duration: totalCycle, iterations: Infinity, fill: 'none' });
    }
  }

  /* Builds the {el, delay, duration, dx, dy, scaleFrom, targetOpacity,
     enterEase} entries playSeamlessLoop() needs, for whichever style is
     currently active — Rise/Fall use one shared motion for every
     fragment (their existing per-fragment --delay stagger), Radiate
     keeps its core/satellite split. */
  function buildEntriesForActiveStyle() {
    const logo = LOGOS[activeKey];
    if (logo.mode === 'paths') {
      const frags = Array.from(stage.querySelectorAll('.reveal-path'));
      if (activeStyle === 'radiate' || activeStyle === 'spin') {
        // Spin uses the exact same fragment positions/timing as Radiate —
        // the whole composition rotating (see startSeamlessLoop) is what
        // makes it "spin," not any per-fragment rotation.
        return frags.map(el => {
          const isCore = el.classList.contains('core');
          return {
            el,
            delay: parseFloat(el.style.getPropertyValue('--r-delay')) || 0,
            duration: isCore ? CORE_DUR_MS : SAT_DUR_MS,
            dx: el.style.getPropertyValue('--dx') || '0px',
            dy: el.style.getPropertyValue('--dy') || '0px',
            scaleFrom: parseFloat(el.style.getPropertyValue('--scale-from')) || (isCore ? 0.85 : 0.4),
            targetOpacity: parseFloat(el.style.getPropertyValue('--target-opacity')) || 1,
            enterEase: isCore ? EASE_DOWN : EASE_RADIATE_SAT
          };
        });
      }
      if (activeStyle === 'up' && logo.radiateMode === 'concentric') {
        return frags.map(el => ({
          el,
          delay: parseFloat(el.style.getPropertyValue('--rise-delay')) || 0,
          duration: parseFloat(el.style.getPropertyValue('--rise-duration')) || RISE_INNER_DUR_MS,
          dx: '0px',
          dy: el.style.getPropertyValue('--rise-dy') || '0px',
          rotateFrom: el.style.getPropertyValue('--rise-rotate-from') || '0deg',
          scaleFrom: parseFloat(el.style.getPropertyValue('--rise-scale')) || 0.9,
          targetOpacity: parseFloat(el.style.getPropertyValue('--target-opacity')) || 1,
          enterEase: EASE_RISE_ROTATE
        }));
      }
      const motion = PATH_MOTION[activeStyle];
      return frags.map(el => ({
        el,
        delay: parseFloat(el.style.getPropertyValue('--delay')) || 0,
        duration: motion.duration,
        dx: motion.dx,
        dy: motion.dy,
        scaleFrom: motion.scaleFrom,
        targetOpacity: parseFloat(el.style.getPropertyValue('--target-opacity')) || 1,
        enterEase: motion.ease
      }));
    }
    const whole = stage.querySelector('.reveal-whole');
    if (!whole) return [];
    const motion = WHOLE_MOTION[activeStyle];
    return [{
      el: whole, delay: 0, duration: motion.duration,
      dx: motion.dx, dy: motion.dy, rotateFrom: motion.rotateFrom,
      scaleFrom: motion.scaleFrom, targetOpacity: 1, enterEase: motion.ease
    }];
  }

  function startSeamlessLoop() {
    const entries = buildEntriesForActiveStyle();
    if (!entries.length) return;
    const spinGroup = activeStyle === 'spin' ? stage.querySelector('.spin-group') : null;
    playSeamlessLoop(entries, spinGroup, spinGroup ? SPIN_GROUP_ANGLE : null);
  }

  /* Single source of truth for what should currently be animating,
     called after every logo/style selection and loop toggle. All three
     styles use the same seamless build-in → hold → build-out → rest
     loop when Loop is on. */
  function applyLoopState() {
    resetStageAnimations();
    if (!loopEnabled) {
      playReveal();
    } else {
      startSeamlessLoop();
    }
  }

  document.getElementById('loopToggle').addEventListener('change', (e) => {
    loopEnabled = e.target.checked;
    applyLoopState();
  });

  selectLogo(activeKey);
</script>
